# Reference copy of the server blocks added to the shared reverse proxy at
# /root/miluim/nginx/nginx.conf (container: yogev-nginx) on 72.62.154.127.
# The geniriflow-landing container joins miltech-association-net so nginx can
# reach it by name. TLS (Let's Encrypt) terminates at the shared proxy.

# HTTP: serve ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name geniriflow.miltech.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: reverse proxy -> Next.js standalone container
server {
    listen 443 ssl;
    http2 on;
    server_name geniriflow.miltech.cloud;

    ssl_certificate     /etc/letsencrypt/live/geniriflow.miltech.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/geniriflow.miltech.cloud/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:GeniriflowSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    resolver 127.0.0.11 valid=10s;
    set $geniriflow_web geniriflow-landing:3000;

    client_max_body_size 50M;

    location / {
        proxy_pass http://$geniriflow_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }

    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }
}
