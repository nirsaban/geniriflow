# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    server_name geniriflow.miltech;
    return 301 https://$host$request_uri;
}

# HTTPS reverse proxy -> Next.js standalone server (web:3000).
server {
    listen 443 ssl;
    http2 on;
    server_name geniriflow.miltech;

    ssl_certificate     /etc/nginx/certs/geniriflow.miltech.crt;
    ssl_certificate_key /etc/nginx/certs/geniriflow.miltech.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Allow large video assets in /public
    client_max_body_size 50m;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket / HMR upgrade support
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
