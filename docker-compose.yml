services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: geniriflow-landing:latest
    container_name: geniriflow-landing
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    # No published host ports: traffic arrives via the shared yogev-nginx
    # reverse proxy on the miltech-association-net network (TLS terminates there
    # for geniriflow.miltech.cloud). Reachable as http://geniriflow-landing:3000.
    networks:
      - miltech-association-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  miltech-association-net:
    external: true
    name: miltech-association-net
